version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: worldcup_db
    environment:
      POSTGRES_DB: worldcup
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: worldcup-backend:latest
    container_name: worldcup_backend
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://192.168.1.79:8000
      FRONTEND_URL: http://192.168.1.79:3000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: worldcup
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      SANCTUM_STATEFUL_DOMAINS: "192.168.1.79:3000"
      FOOTBALL_DATA_TOKEN: "8c7ff8d5cf174eeb8c393fbef2819448"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # Laravel Scheduler — runs `worldcup:sync` every 30 minutes
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: worldcup-backend:latest
    container_name: worldcup_scheduler
    command: sh -c "php artisan config:clear && php artisan schedule:work"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: worldcup
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      FOOTBALL_DATA_TOKEN: "8c7ff8d5cf174eeb8c393fbef2819448"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://192.168.1.79:8000/api
    container_name: worldcup_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://192.168.1.79:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
