services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: worldcup_db
    restart: always
    environment:
      POSTGRES_DB: worldcup
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: worldcup-backend:latest
    container_name: worldcup_backend
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://worldcup.voyager-hcm.com
      FRONTEND_URL: https://worldcup.voyager-hcm.com
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: worldcup
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      SANCTUM_STATEFUL_DOMAINS: "worldcup.voyager-hcm.com"
      GOOGLE_CLIENT_ID: "533296227630-v2uivkargthbi3bdrs3h2rcnl7ktbgsf.apps.googleusercontent.com"
      GOOGLE_ALLOWED_DOMAIN: "voyager-hcm.com"
      FOOTBALL_DATA_TOKEN: "8c7ff8d5cf174eeb8c393fbef2819448"
      ODDS_API_KEY: "d1939f55377d9ab41d400554f5711742"
    ports:
      - "8000:8000"
    volumes:
      - backend_public_storage:/var/www/html/storage/app/public
    depends_on:
      postgres:
        condition: service_healthy

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: "533296227630-v2uivkargthbi3bdrs3h2rcnl7ktbgsf.apps.googleusercontent.com"
    container_name: worldcup_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: "533296227630-v2uivkargthbi3bdrs3h2rcnl7ktbgsf.apps.googleusercontent.com"
    depends_on:
      - backend

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: worldcup_nginx
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  backend_public_storage:
